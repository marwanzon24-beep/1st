<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Game Hub</title>

<style>
body{
  margin:0;
  font-family:Arial;
  direction:rtl;
  overflow-x:hidden;
  transition:0.5s;
}

/* خلفية */
.bg{
  background: linear-gradient(270deg,#fff176,#64b5f6,#ffd54f);
  background-size:600% 600%;
  animation:bgMove 12s ease infinite;
}
@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.container{max-width:420px;margin:auto;padding:15px}

.card{
  background:rgba(255,255,255,0.92);
  border-radius:18px;
  padding:15px;
  margin-top:15px;
  box-shadow:0 10px 25px rgba(0,0,0,0.25);
  animation:pop .4s ease;
}
@keyframes pop{
  from{transform:scale(0.95);opacity:0}
  to{transform:scale(1);opacity:1}
}

input,select{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:12px;
  border:1px solid #ddd;
}

button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  font-weight:bold;
  cursor:pointer;
  background:linear-gradient(135deg,#222,#666);
  color:#fff;
  transition:0.3s;
}
button:hover{transform:scale(1.05)}
button:active{transform:scale(0.95)}

.user{
  background:#f5f5f5;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
}

.avatar{
  font-size:30px;
}
.shopItem{
  background:#fff;
  padding:10px;
  border-radius:12px;
  margin-top:10px;
  border:1px solid #eee;
}
</style>
</head>

<body class="bg">

<div class="container">

  <div class="card" id="login">
    <h3>تسجيل دخول</h3>
    <input id="name" placeholder="الاسم">
    <input id="pass" type="password" placeholder="الباسورد">
    <button onclick="login()">دخول</button>
  </div>

  <div class="card" id="panel" style="display:none">

    <h3 id="welcome"></h3>

    <button onclick="addXP()">+ XP</button>

    <div id="me"></div>

    <div id="admin" style="display:none">
      <h4>الأدمن</h4>
      <div id="users"></div>
    </div>

    <h4>المتجر 🛒</h4>
    <div class="shopItem">
      Skin 🔵 - 50 XP
      <button onclick="buySkin('blue')">شراء</button>
    </div>

    <div class="shopItem">
      Skin 🟡 - 50 XP
      <button onclick="buySkin('yellow')">شراء</button>
    </div>

  </div>

</div>

<script>
let users = {
 Aya:{pass:"123",xp:0,avatar:"🙂",skin:""},
 Habiba:{pass:"123",xp:0,avatar:"😊",skin:""},
 Yassin:{pass:"123",xp:0,avatar:"😎",skin:""},
 Marwan:{pass:"123",xp:0,avatar:"🔥",skin:""},
 admin:{pass:"admin",xp:999,avatar:"👑",skin:""}
};

let current=null;

function save(){
 localStorage.setItem("game",JSON.stringify(users));
}
function load(){
 let d=localStorage.getItem("game");
 if(d) users=JSON.parse(d);
}
load();

function login(){
 let n=document.getElementById("name").value;
 let p=document.getElementById("pass").value;

 if(users[n] && users[n].pass===p){
  current=n;
  document.getElementById("login").style.display="none";
  document.getElementById("panel").style.display="block";
  document.getElementById("welcome").innerText="أهلاً "+n;

  if(n==="admin"){
    document.getElementById("admin").style.display="block";
    render();
  }

  show();
 }
}

function show(){
 let u=users[current];
 document.getElementById("me").innerHTML=`
  <div class="user">
    <div class="avatar">${u.avatar}</div>
    XP: ${u.xp}<br>
    Skin: ${u.skin||"none"}
  </div>
 `;
}

function addXP(){
 users[current].xp += 10;
 save();
 show();
 if(current==="admin") render();
}

function buySkin(s){
 if(users[current].xp>=50){
  users[current].xp-=50;
  users[current].skin=s;
  save();
  show();
 } else {
  alert("XP مش كفاية");
 }
}

function render(){
 let html="";
 for(let k in users){
  html+=`
   <div class="user">
    ${k}<br>
    XP: <input value="${users[k].xp}" onchange="users['${k}'].xp=this.value;save()">
   </div>
  `;
 }
 document.getElementById("users").innerHTML=html;
}
</script>

</body>
</html>
